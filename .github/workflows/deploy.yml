# Deployment workflow — runs on push to main or manual dispatch.
#
# Deploys the frontend to Vercel and the backend to AWS Lambda via SAM.
# Both jobs run in parallel since they are independent.
#
# Prerequisites:
#   Backend: Poetry (installed via pipx in CI) is used to generate
#            requirements.txt from poetry.lock at build time.
#
# Required GitHub Secrets:
#   Frontend: VERCEL_TOKEN
#   Backend:  AWS_ROLE_TO_ASSUME (OIDC role ARN),
#             SUPABASE_URL, SUPABASE_KEY,
#             CORS_ORIGINS, CORS_ORIGIN_REGEX

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Default to read-only; jobs override only what they need.
permissions:
  contents: read

# Prevent concurrent deployments — never cancel a deploy in progress.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"

jobs:
  # ==========================================
  # Deploy Frontend to Vercel
  # ==========================================
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # ==========================================
  # Deploy Backend to AWS Lambda (via SAM)
  # ==========================================
  deploy-backend:
    name: Deploy Backend to AWS Lambda
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required for OIDC authentication with AWS
      contents: read
    # Optional: enable GitHub Environments for deployment protection rules.
    # environment: development
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pipx install poetry

      - name: Export requirements.txt from Poetry lock
        run: poetry export -f requirements.txt --without-hashes -o requirements.txt

      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@v3
        with:
          use-installer: true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Validate SAM template
        run: sam validate --lint

      - name: SAM Build
        run: sam build

      - name: SAM Deploy
        run: |
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset \
            --config-env dev \
            --stack-name morning-routine-api-dev \
            --s3-bucket aws-sam-cli-managed-default-samclisourcebucket-0mbllpcd84sn \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              Environment=development \
              SupabaseUrl=${{ secrets.SUPABASE_URL }} \
              SupabaseKey=${{ secrets.SUPABASE_KEY }} \
              CorsOrigins="${{ secrets.CORS_ORIGINS }}" \
              CorsOriginRegex="${{ secrets.CORS_ORIGIN_REGEX }}"
