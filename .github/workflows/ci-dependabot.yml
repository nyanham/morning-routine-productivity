# Security scanning & Dependabot auto-merge.
#
# This workflow owns the SARIF upload so that code-scanning tracks
# a single baseline across push / PR / Dependabot events.
# It also auto-merges minor and patch Dependabot PRs after CI passes.

name: Security & Dependabot

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to read-only; jobs override only what they need.
permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================
  # Trivy filesystem vulnerability scan
  # ==========================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    # Skip for fork PRs — GitHub does not grant security-events: write
    # in that context, which would cause the SARIF upload to fail.
    if: >-
      github.event_name != 'pull_request'
      || github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      security-events: write   # upload SARIF
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.34.2
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # ==========================================
  # Auto-merge Dependabot minor / patch PRs
  # ==========================================
  dependabot-auto-merge:
    name: Dependabot Auto-Merge
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    needs: security-scan

    permissions:
      contents: write        # merge the PR
      pull-requests: write   # approve the PR

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Auto-merge minor and patch updates
        if: >-
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
          || steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
