# Continuous Integration — runs on every push and pull request.
#
# Frontend and backend CI logic lives in reusable workflows
# (_ci-frontend.yml, _ci-backend.yml) so it stays DRY across
# this workflow and ci-dependabot.yml.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ==========================================
  # Frontend CI (lint → test → build)
  # ==========================================
  frontend:
    name: Frontend
    # Dependabot PRs are handled by ci-dependabot.yml (pull_request_target)
    if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]'
    uses: ./.github/workflows/_ci-frontend.yml
    secrets: inherit

  # ==========================================
  # Backend CI (lint → test)
  # ==========================================
  backend:
    name: Backend
    # Dependabot PRs are handled by ci-dependabot.yml (pull_request_target)
    if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]'
    uses: ./.github/workflows/_ci-backend.yml
    secrets: inherit

  # ==========================================
  # Security Scanning
  # ==========================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    # Runs on pushes and same-repo PRs. For PRs from forks, this job is
    # skipped because GitHub does not grant `security-events: write`,
    # which would cause SARIF upload to fail and block CI for contributors.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
