# Continuous Integration — runs on every push and pull request.
#
# Frontend and backend CI logic lives in reusable workflows
# (_ci-frontend.yml, _ci-backend.yml) to keep things DRY.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ==========================================
  # Frontend CI (lint → test → build)
  # ==========================================
  frontend:
    name: Frontend
    uses: ./.github/workflows/_ci-frontend.yml
    secrets: inherit

  # ==========================================
  # Backend CI (lint → test)
  # ==========================================
  backend:
    name: Backend
    uses: ./.github/workflows/_ci-backend.yml
    secrets: inherit

  # ==========================================
  # Security Scanning
  # ==========================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    # Skipped for fork PRs — GitHub does not grant `security-events: write`
    # in that context, which would cause SARIF upload to fail.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.34.2
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
