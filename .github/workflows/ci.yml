# Continuous Integration — runs on every push and pull request.
#
# Frontend and backend CI logic lives in reusable workflows
# (_ci-frontend.yml, _ci-backend.yml) to keep things DRY.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to read-only; individual jobs inherit this.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================
  # Frontend CI (lint → test → build)
  # ==========================================
  frontend:
    name: Frontend
    uses: ./.github/workflows/_ci-frontend.yml
    secrets: inherit

  # ==========================================
  # Backend CI (lint → test)
  # ==========================================
  backend:
    name: Backend
    uses: ./.github/workflows/_ci-backend.yml
    secrets: inherit

  # Security scanning lives in ci-dependabot.yml so that code-scanning
  # tracks a single SARIF baseline across push / PR / Dependabot events.
